<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Sort - 单词分类</title>
<style>
/* ===== 全局样式 ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
  background: #1a1a2e;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* ===== 游戏容器 ===== */
#game-container {
  position: relative;
  width: 100vw; height: 100vh;
  max-width: 540px;
  margin: 0 auto;
  background: linear-gradient(180deg, #16213e 0%, #0f3460 50%, #1a1a2e 100%);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== 选关界面 ===== */
#level-select {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%; height: 100%;
  padding: 20px;
}
#level-select .title {
  color: #e94560;
  font-size: 8vw;
  font-weight: bold;
  margin-bottom: 10px;
  text-shadow: 0 0 20px rgba(233,69,96,0.5);
}
#level-select .subtitle {
  color: #a0a0b8;
  font-size: 3.5vw;
  margin-bottom: 30px;
}
#level-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  width: 100%;
  max-width: 450px;
  overflow-y: auto;
  max-height: 70vh;
  padding: 10px;
}
.level-btn {
  aspect-ratio: 1;
  border: 2px solid #e94560;
  border-radius: 16px;
  background: rgba(233,69,96,0.1);
  color: #fff;
  font-size: 5vw;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.level-btn:hover, .level-btn:active {
  background: rgba(233,69,96,0.35);
  transform: scale(1.05);
}

/* ===== 游戏界面 ===== */
#game-screen {
  display: none;
  flex-direction: column;
  width: 100%; height: 100%;
}

/* 顶部栏 */
#top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  height: 56px;
  background: rgba(0,0,0,0.3);
}
#top-bar .btn {
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
#top-bar .btn:hover { background: rgba(255,255,255,0.25); }
#level-name {
  color: #fff;
  font-size: 18px;
  font-weight: bold;
}
#hearts {
  display: flex;
  gap: 4px;
}
#hearts .heart {
  font-size: 24px;
  transition: all 0.3s;
}
#hearts .heart.lost {
  opacity: 0.3;
  transform: scale(0.7);
}

/* 分类框区域 */
#category-area {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 12px 16px 8px;
}
.cat-wrapper {
  width: 28%;
}
.cat-box {
  width: 100%;
  /* 响应式高度：手机上自适应缩小，PC上保持285px上限 */
  height: min(285px, 42vh);
  border: 2px dashed rgba(255,255,255,0.4);
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 8px;
  align-items: center;
  justify-content: flex-start;
  transition: background 0.3s, border-color 0.3s;
  position: relative;
}
.cat-box.filled { border-style: solid; border-color: rgba(255,255,255,0.6); }
.cat-box.full { border-color: #4ecca3; background: rgba(78,204,163,0.15); }
.cat-box.locked {
  border-color: rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.03);
  cursor: pointer;
  justify-content: center;
}
.cat-box.locked::after {
  content: '+';
  color: rgba(255,255,255,0.5);
  font-size: 32px;
  font-weight: bold;
}
.cat-box .type-label {
  position: absolute;
  top: -22px;
  left: 50%;
  transform: translateX(-50%);
  color: #4ecca3;
  font-size: 12px;
  font-weight: bold;
  white-space: nowrap;
  animation: fadeIn 0.3s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* 临时存储框区域 */
#storage-area {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 8px 16px;
}
.store-slot {
  width: 18%;
  min-height: 62px;
  border: 2px dashed rgba(255,255,255,0.3);
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.store-slot.occupied { border-style: solid; border-color: rgba(255,255,255,0.5); }
.store-slot.locked {
  border-color: rgba(255,255,255,0.15);
  cursor: pointer;
}
.store-slot.locked::after {
  content: '+';
  color: rgba(255,255,255,0.4);
  font-size: 24px;
}

/* 单词队列区域 */
#queue-area {
  flex: 1;
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 8px 16px 16px;
  overflow: hidden;
}
.queue-column {
  flex: 1;
  max-width: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}
.queue-column-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  width: 100%;
  transition: transform 0.3s;
}

/* 单词瓦片 */
.word-tile {
  width: 100%;
  aspect-ratio: 1.6;
  border-radius: 12px;
  background: linear-gradient(135deg, #4a3f7a, #6b5ec2);
  color: #fff;
  font-size: 14px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  transition: transform 0.15s, opacity 0.3s, box-shadow 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  position: relative;
}
.word-tile:active { cursor: grabbing; }
.word-tile.top-tile {
  background: linear-gradient(135deg, #27ae60, #4ecca3);
  box-shadow: 0 4px 16px rgba(39,174,96,0.5);
  font-size: 16px;
  z-index: 2;
}
.word-tile.qmark {
  background: linear-gradient(135deg, #555, #777);
  color: #ccc;
}
.word-tile.hidden {
  opacity: 0.4;
  pointer-events: none;
}
.word-tile .tile-text {
  position: relative;
  z-index: 1;
}

/* 拖动中的克隆元素 */
.drag-clone {
  position: fixed;
  z-index: 1000;
  pointer-events: none;
  opacity: 0.9;
  transform: scale(1.08);
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.drag-clone.moving { transition: none; }

/* 在分类框或存储框中的小单词 */
.small-word {
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: bold;
  color: #fff;
  white-space: nowrap;
}
.small-word.has-color { /* 颜色由JS动态设置 */ }
/* 存储框内的单词：与队列顶端绿色单词尺寸一致，绿色底 */
.store-word {
  width: 90%;
  aspect-ratio: 1.6;
  max-width: 95px;
  border-radius: 12px;
  background: linear-gradient(135deg, #27ae60, #4ecca3);
  box-shadow: 0 4px 16px rgba(39,174,96,0.5);
  color: #fff;
  font-size: 14px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 4px;
}
/* 分类框内的单词：纵向排列，与队列中单词尺寸一致 */
.cat-word {
  width: 88%;
  max-width: 100px;
  aspect-ratio: 1.6;
  border-radius: 12px;
  font-size: 14px;
  font-weight: bold;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 6px;
}

/* 消除动画 */
@keyframes eliminate {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.5; }
  100% { transform: scale(0); opacity: 0; }
}
.eliminating { animation: eliminate 0.5s forwards; }

/* ===== 模态弹窗 ===== */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal.show { display: flex; }
.modal-content {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 2px solid #e94560;
  border-radius: 24px;
  padding: 40px 30px;
  text-align: center;
  max-width: 340px;
  width: 85%;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.modal-icon { font-size: 64px; margin-bottom: 16px; }
.modal-title {
  color: #fff;
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 8px;
}
.modal-desc {
  color: #a0a0b8;
  font-size: 14px;
  margin-bottom: 24px;
}
.modal-btn {
  background: linear-gradient(135deg, #e94560, #c23152);
  border: none;
  color: #fff;
  padding: 14px 36px;
  border-radius: 30px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 15px rgba(233,69,96,0.4);
}
.modal-btn:hover { transform: scale(1.05); }
.modal-btn.secondary {
  background: rgba(255,255,255,0.15);
  box-shadow: none;
  margin-top: 10px;
  font-size: 14px;
  padding: 10px 28px;
}
.modal-buttons { display: flex; flex-direction: column; align-items: center; gap: 8px; }

/* 类型名称弹出 */
.type-reveal {
  position: absolute;
  top: -28px;
  left: 50%;
  transform: translateX(-50%);
  color: #4ecca3;
  font-size: 13px;
  font-weight: bold;
  white-space: nowrap;
  animation: fadeUp 0.8s forwards;
}
@keyframes fadeUp {
  0% { opacity: 0; top: 0; }
  30% { opacity: 1; top: -28px; }
  100% { opacity: 0; top: -40px; }
}

/* 提示toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 14px;
  z-index: 200;
  animation: toastIn 0.3s;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* 响应式：桌面端微调 */
@media (min-width: 768px) {
  #level-select .title { font-size: 36px; }
  #level-select .subtitle { font-size: 16px; }
  .level-btn { font-size: 22px; }
  .word-tile { font-size: 13px; }
  .word-tile.top-tile { font-size: 15px; }
}
</style>
</head>

</div>

<!-- 胜利弹窗 -->
<div id="victory-modal" class="modal">

    </div>
  </div>
</div>

<!-- 失败弹窗 -->
<div id="defeat-modal" class="modal">

    <div class="modal-icon">😢</div>
    <div class="modal-title">失败了</div>
    <div class="modal-desc" id="defeat-desc"></div>
    <div class="modal-buttons">
      <button class="modal-btn" onclick="resetLevel()">重新挑战</button>
      <button class="modal-btn secondary" onclick="backToSelect()">返回选关</button>
    </div>
  </div>
</div>

<div id="loading-modal" class="modal">

    <div class="modal-icon">⏳</div>
    <div class="modal-title">正在创建关卡，请稍等……</div>
  </div>
</div>

  unlockedCatBoxes: 2,         // 已解锁的分类框数量（初始2）
  storage: [],                 // 临时存储：[wordObj|null, ...]
  unlockedStorage: 3,          // 已解锁的存储框数量（初始3）

  dragClone: null

// ============================================================
// 三、工具函数
// ============================================================

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function randomPick(arr, n) {
  return shuffle(arr).slice(0, n);
}

// 计算某wordId属于哪个类型
function getWordType(wordId) {
  for (const [tid, t] of Object.entries(TYPES)) {
    if (t.words.includes(wordId)) return parseInt(tid);
  }
  return null;
}

function checkSolvable(genData, wordCount) {
  const {columns} = genData;

  // 对于≤32单词的关卡，使用完整的DFS检查
  // 对于更大关卡，使用带超时的DFS（最大500k节点）
  const maxNodes = wordCount <= 32 ? 100000 : 500000;
  const startTime = Date.now();
  const timeLimit = wordCount <= 40 ? 3000 : 5000; // 3-5秒超时

  // 深拷贝状态（只拷贝需要的字段）
  const cols = columns.map(col => col.map(w => ({wordId:w.wordId, typeId:w.typeId})));
  // 关卡初始化时已解锁2个分类框和3个存储框（未解锁的不参与判断）
  const storage = [null, null, null]; // 3个已解锁存储位
  const catBoxes = [
    {typeId: null, words: []}, // 2个已解锁分类框
    {typeId: null, words: []}
  ];

  // 使用BFS/DFS搜索，带记忆化
  const visited = new Set();
  const maxDepth = 300;
  let nodesExplored = 0;

  function stateKey() {
    const colKeys = cols.map(c => c.map(w => `${w.wordId}:${w.typeId}`).join(',')).join('|');
    const catKeys = catBoxes.map(b => `${b.typeId||'null'}:${b.words.map(w=>w.wordId).join(',')}`).join('|');
    const storeKey = storage.map(s => s ? `${s.wordId}:${s.typeId}` : 'null').join(',');
    return [colKeys, catKeys, storeKey].join('|||');
  }

  function isWin() {
    // 所有列都空，所有分类框都空（或正在消除中=4个满）
    const allColsEmpty = cols.every(c => c.length === 0);
    // 分类框全部为空即胜利（因为满4个会自动消除）
    const allCatsEmpty = catBoxes.every(b => b.words.length === 0);
    return allColsEmpty && allCatsEmpty;
  }

  // 消除所有满的分类框
  function autoEliminate() {
    for (const box of catBoxes) {
      if (box.words.length >= 4) {
        box.words = [];
        box.typeId = null;
      }
    }
  }

  // 获取所有可能的移动
  function getMoves() {
    const moves = [];

    // 1. 从列顶拖到分类框
    for (let c = 0; c < cols.length; c++) {
      if (cols[c].length === 0) continue;
      const word = cols[c][0];
      for (let b = 0; b < catBoxes.length; b++) {
        const box = catBoxes[b];
        if (box.words.length >= 4) continue; // 满的会自动消除
        if (box.typeId === null || box.typeId === word.typeId) {
          moves.push({type:'colToCat', col:c, box:b, word});
        }
      }
    }

    // 2. 从列顶拖到存储框
    for (let c = 0; c < cols.length; c++) {
      if (cols[c].length === 0) continue;
      const word = cols[c][0];
      for (let s = 0; s < storage.length; s++) {
        if (storage[s] === null) {
          moves.push({type:'colToStorage', col:c, storage:s, word});
        }
      }
    }

    // 3. 从存储框拖到分类框
    for (let s = 0; s < storage.length; s++) {
      if (storage[s] === null) continue;
      const word = storage[s];
      for (let b = 0; b < catBoxes.length; b++) {
        const box = catBoxes[b];
        if (box.words.length >= 4) continue;
        if (box.typeId === null || box.typeId === word.typeId) {
          moves.push({type:'storageToCat', storage:s, box:b, word});
        }
      }
    }

    // 4. 从分类框拖到另一个分类框
    for (let srcBox = 0; srcBox < catBoxes.length; srcBox++) {
      const src = catBoxes[srcBox];
      if (src.words.length === 0) continue;
      for (const word of src.words) {
        for (let dstBox = 0; dstBox < catBoxes.length; dstBox++) {
          if (srcBox === dstBox) continue;
          const dst = catBoxes[dstBox];
          if (dst.words.length >= 4) continue;
          if (dst.typeId === null || dst.typeId === word.typeId) {
            moves.push({type:'catToCat', srcBox, dstBox, word,
              savedSrc: {typeId: src.typeId, words: [...src.words]}});
          }
        }
      }
    }

    return moves;
  }

  function applyMove(move) {
    if (move.type === 'colToCat') {
      move._savedBox = {typeId: catBoxes[move.box].typeId, words: [...catBoxes[move.box].words]};
      cols[move.col].shift();
      catBoxes[move.box].typeId = move.word.typeId;
      catBoxes[move.box].words.push(move.word);
      autoEliminate();
    } else if (move.type === 'colToStorage') {
      cols[move.col].shift();
      storage[move.storage] = move.word;
    } else if (move.type === 'storageToCat') {
      move._savedBox = {typeId: catBoxes[move.box].typeId, words: [...catBoxes[move.box].words]};

      storage[move.storage] = move.word;
    } else if (move.type === 'catToCat') {
      // 恢复目标框和源框
      catBoxes[move.dstBox].typeId = move._savedDst.typeId;
      catBoxes[move.dstBox].words = move._savedDst.words;
      catBoxes[move.srcBox].typeId = move.savedSrc.typeId;
      catBoxes[move.srcBox].words = move.savedSrc.words;
    }

  function dfs(depth) {
    if (depth > maxDepth) return false;
    nodesExplored++;
    if (nodesExplored > maxNodes) return false;
    if (nodesExplored % 5000 === 0 && Date.now() - startTime > timeLimit) return false;
    if (isWin()) return true;

    const key = stateKey();

      const bMatch = isMatch(b) ? 0 : 1;

      const aIsCat = (a.type === 'colToCat' || a.type === 'storageToCat' || a.type === 'catToCat') ? 0 : 1;

// 渲染选关界面
function renderLevelSelect() {

// 开始关卡
function startLevel(levelIndex) {
  G.currentLevelIndex = levelIndex;
  const lvlConfig = LEVELS[levelIndex];

  // 从预烘焙数据加载关卡（不再运行时随机生成）
  const baked = BAKED_LEVELS[lvlConfig.id];
  // 转换字段名：wid→wordId, tid→typeId, txt→text
  const columns = baked.columns.map(col =>
    col.map(w => ({wordId: w.wid, typeId: w.tid, text: w.txt}))
  );
  const colors = baked.colors;
  // qmarks转为Set格式
  const qmarkPositions = new Set(baked.qmarks.map(p => p[0] + ',' + p[1]));

  G.levelData = lvlConfig;
  G.typeColors = colors;

  G.initColumns = columns.map(col => col.map(w => ({...w})));
  markQMarkWords(G.initColumns, qmarkPositions);
  G.initQMarkPositions = new Set(qmarkPositions);

  resetGameState();

  document.getElementById('level-select').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('level-name').textContent = 'Level ' + (levelIndex + 1);

  renderGame();
}

// 重置游戏状态（不重新生成）
function resetGameState() {
  G.columns = G.initColumns.map(col => col.map(w => ({...w, isQMark: w.isQMark})));
  G.categoryBoxes = [
    {typeId: null, words: []},
    {typeId: null, words: []},
    {typeId: null, words: []}
  ];
  G.unlockedCatBoxes = 2;
  G.storage = [null, null, null, null];
  G.unlockedStorage = 3;
  G.hearts = 3;
}

// 渲染游戏画面
function renderGame() {
  renderCategoryBoxes();
  renderStorage();
  renderQueue();
  renderHearts();
  checkWinLose();
}

function renderCategoryBoxes() {
  const area = document.getElementById('category-area');
  area.innerHTML = '';

  for (let i = 0; i < 3; i++) {
    // 每个分类框用一个 wrapper 包裹，上方有类型名称标签
    const wrapper = document.createElement('div');
    wrapper.className = 'cat-wrapper';
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';
    wrapper.style.alignItems = 'center';
    wrapper.style.width = '28%';

    // 类型名称标签（初始隐藏）
    const label = document.createElement('div');
    label.className = 'cat-type-label';
    label.style.height = '22px';
    label.style.lineHeight = '22px';
    label.style.fontSize = '14px';
    label.style.fontWeight = 'bold';
    label.style.textAlign = 'center';
    label.style.opacity = '0';
    label.style.transition = 'opacity 0.3s';

    const box = document.createElement('div');
    box.className = 'cat-box';
    box.dataset.boxIndex = i;

    if (i >= G.unlockedCatBoxes) {
      // 锁定的分类框
      box.classList.add('locked');
      box.addEventListener('click', () => unlockCatBox());
      box.addEventListener('touchend', (e) => {
        e.preventDefault();
        unlockCatBox();
      });
    } else {
      const catBox = G.categoryBoxes[i];
      if (catBox.words.length > 0) {
        box.classList.add('filled');
        const color = G.typeColors[catBox.typeId] || '#e94560';
        box.style.borderColor = color;

        if (catBox.words.length === 4) {
          box.classList.add('full');
        }

        // 类型名称标签：只在填满4个时显示
        if (catBox.words.length >= 4) {
          const typeName = TYPES[catBox.typeId] ? TYPES[catBox.typeId].name : '';
          label.textContent = typeName;
          label.style.color = color;
          label.style.opacity = '1';
        } else {
          label.textContent = '';
          label.style.opacity = '0';
        }

        // 显示框内单词（可拖动到其他分类框）
        catBox.words.forEach(w => {
          const span = document.createElement('span');
          span.className = 'cat-word';
          span.style.background = color;
          span.style.cursor = 'grab';
          span.textContent = w.text;
          span.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            onDragStart(e, w, null, false, true, i);
          });
          span.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            onDragStart(e, w, null, false, true, i);
          }, {passive: false});
          box.appendChild(span);
        });
      } else {
        box.style.borderColor = '';
        label.textContent = '';
        label.style.opacity = '0';
      }
    }
    wrapper.appendChild(box);
    wrapper.appendChild(label);
    area.appendChild(wrapper);
  }
}

function renderStorage() {
  const area = document.getElementById('storage-area');
  area.innerHTML = '';

  for (let i = 0; i < 4; i++) {
    const slot = document.createElement('div');
    slot.className = 'store-slot';
    slot.dataset.storageIndex = i;

    if (i >= G.unlockedStorage) {
      slot.classList.add('locked');
      slot.addEventListener('click', () => unlockStorage());
      slot.addEventListener('touchend', (e) => {
        e.preventDefault();
        unlockStorage();
      });
    } else if (G.storage[i] !== null) {
      slot.classList.add('occupied');
      // 临时存储框使用中性色，不暴露类型颜色
      const neutralColor = 'rgba(255,255,255,0.25)';
      slot.style.borderColor = neutralColor;
      const span = document.createElement('span');
      span.className = 'store-word';
      span.textContent = G.storage[i].text;
      span.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        onDragStart(e, G.storage[i], null, true, false, i);
      });
      span.addEventListener('touchstart', (e) => {
        e.stopPropagation();
        onDragStart(e, G.storage[i], null, true, false, i);
      }, {passive: false});
      slot.appendChild(span);
    }
    area.appendChild(slot);
  }
}

function renderQueue() {
  const area = document.getElementById('queue-area');
  area.innerHTML = '';

  G.columns.forEach((col, colIndex) => {
    const colDiv = document.createElement('div');
    colDiv.className = 'queue-column';

    const inner = document.createElement('div');
    inner.className = 'queue-column-inner';

    col.forEach((wordObj, rowIndex) => {
      const tile = document.createElement('div');
      tile.className = 'word-tile';

      const isTop = (rowIndex === 0);
      // 问号单词：有isQMark标记且不在列顶
      const qmark = wordObj.isQMark && !isTop;

      if (isTop) {
        tile.classList.add('top-tile');
        // 可拖动：绑定事件
        tile.addEventListener('mousedown', (e) => onDragStart(e, wordObj, colIndex, false, false, colIndex));
        tile.addEventListener('touchstart', (e) => onDragStart(e, wordObj, colIndex, false, false, colIndex), {passive: false});
      }
      if (qmark) {
        tile.classList.add('qmark');
      }

      const textSpan = document.createElement('span');
      textSpan.className = 'tile-text';
      textSpan.textContent = qmark ? '?' : wordObj.text;
      tile.appendChild(textSpan);

      inner.appendChild(tile);
    });

    colDiv.appendChild(inner);
    area.appendChild(colDiv);
  });

}

function renderHearts() {
  const container = document.getElementById('hearts');
  container.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const span = document.createElement('span');
    span.className = 'heart' + (i >= G.hearts ? ' lost' : '');
    span.textContent = '❤️';
    container.appendChild(span);
  }
}

// 解锁分类框
function unlockCatBox() {
  if (G.unlockedCatBoxes >= 3) return;
  G.unlockedCatBoxes++;
  renderGame();
}

// 解锁存储框
function unlockStorage() {
  if (G.unlockedStorage >= 4) return;
  G.unlockedStorage++;
  renderGame();
}

// 七、拖拽处理
// ============================================================

let dragOriginElement = null; // 被拖动的原始元素

// sourceIsCatBox: 从分类框拖出; sourceIsStorage: 从存储框拖出; 否则从队列拖出
// sourceIndex: 列索引/存储索引/分类框索引
function onDragStart(e, wordObj, sourceCol, sourceIsStorage, sourceIsCatBox, sourceIndex) {
  if (G.isDragging) return;
  e.preventDefault();

  G.isDragging = true;
  G.dragData = { wordObj, sourceCol, sourceIsStorage, sourceIsCatBox, sourceIndex };
  dragOriginElement = e.currentTarget;

  // 创建拖拽克隆（固定原元素尺寸，避免width:100%撑满屏幕）
  const origRect = dragOriginElement.getBoundingClientRect();
  const clone = dragOriginElement.cloneNode(true);
  clone.classList.add('drag-clone');
  clone.style.width = origRect.width + 'px';
  clone.style.height = origRect.height + 'px';
  clone.style.aspectRatio = 'auto';
  document.body.appendChild(clone);
  G.dragClone = clone;

  // 初始定位
  const pt = getEventPoint(e);
  clone.style.left = (pt.x - origRect.width / 2) + 'px';
  clone.style.top = (pt.y - origRect.height / 2) + 'px';

  // 全局移动和释放事件
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchmove', onDragMove, {passive: false});
  document.addEventListener('touchend', onDragEnd);
}

function getEventPoint(e) {
  if (e.touches && e.touches.length > 0) {
    return {x: e.touches[0].clientX, y: e.touches[0].clientY};
  }
  if (e.changedTouches && e.changedTouches.length > 0) {
    return {x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY};
  }
  return {x: e.clientX, y: e.clientY};
}

function onDragMove(e) {
  if (!G.isDragging || !G.dragClone) return;
  e.preventDefault();

  const pt = getEventPoint(e);
  G.dragClone.style.left = (pt.x - G.dragClone.offsetWidth / 2) + 'px';
  G.dragClone.style.top = (pt.y - G.dragClone.offsetHeight / 2) + 'px';

  // 高亮潜在目标
  highlightTargets(pt.x, pt.y);
}

function highlightTargets(x, y) {
  // 重置所有高亮
  document.querySelectorAll('.cat-box').forEach(b => b.style.transform = '');
  document.querySelectorAll('.store-slot').forEach(s => s.style.transform = '');

  // 检测分类框
  document.querySelectorAll('.cat-box:not(.locked)').forEach(box => {
    const rect = box.getBoundingClientRect();
    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
      box.style.transform = 'scale(1.05)';
    }
  });

  // 检测存储框
  document.querySelectorAll('.store-slot:not(.locked):not(.occupied)').forEach(slot => {
    const rect = slot.getBoundingClientRect();
    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
      slot.style.transform = 'scale(1.08)';
    }
  });
}

function onDragEnd(e) {
  if (!G.isDragging) return;

  const pt = getEventPoint(e);
  const target = findDropTarget(pt.x, pt.y);

  if (target) {
    handleDrop(target);
  } else {
    // 无效位置，单词回到原位
    cancelDrag();
  }

  cleanupDrag();
}

function findDropTarget(x, y) {
  // 优先检测分类框
  const catBoxes = document.querySelectorAll('.cat-box:not(.locked)');
  for (const box of catBoxes) {
    const rect = box.getBoundingClientRect();
    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
      return {type: 'catBox', index: parseInt(box.dataset.boxIndex)};
    }
  }

  // 从分类框拖出时，不允许放到存储框
  if (G.dragData && G.dragData.sourceIsCatBox) {
    return null;
  }

  // 检测存储框
  const storeSlots = document.querySelectorAll('.store-slot:not(.locked):not(.occupied)');
  for (const slot of storeSlots) {
    const rect = slot.getBoundingClientRect();
    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
      return {type: 'storage', index: parseInt(slot.dataset.storageIndex)};
    }
  }

  return null;
}

function handleDrop(target) {
  const { wordObj, sourceCol, sourceIsStorage, sourceIsCatBox, sourceIndex } = G.dragData;

  if (target.type === 'catBox') {
    const boxIndex = target.index;
    const catBox = G.categoryBoxes[boxIndex];

    if (catBox.words.length >= 4) return; // 已满

    // === 从分类框拖到另一个分类框 ===
    if (sourceIsCatBox) {
      if (sourceIndex === boxIndex) return; // 拖到同一个框，忽略

      if (catBox.typeId === null) {
        // 目标空白：移入
        removeFromSource(wordObj, sourceCol, sourceIsStorage, sourceIsCatBox, sourceIndex);
        catBox.typeId = wordObj.typeId;
        catBox.words.push(wordObj);
        checkElimination(boxIndex);
      } else if (catBox.typeId === wordObj.typeId) {
        // 同类型：移入
        removeFromSource(wordObj, sourceCol, sourceIsStorage, sourceIsCatBox, sourceIndex);
        catBox.words.push(wordObj);
        checkElimination(boxIndex);
      } else {
        // 不同类型：扣心，单词返回原分类框
        G.hearts--;
        showToast('类型不匹配！');
        // 单词保持在原位（不做remove，直接return回原位）
      }
      renderGame();
      return;
    }

    // === 从队列或存储框拖到分类框（原有逻辑） ===
    if (catBox.typeId === null) {
      // 空白分类框：直接放入
      removeFromSource(wordObj, sourceCol, sourceIsStorage, sourceIsCatBox, sourceIndex);
      catBox.typeId = wordObj.typeId;
      catBox.words.push(wordObj);
      checkElimination(boxIndex);
    } else if (catBox.typeId === wordObj.typeId) {
      // 同类型：放入
      removeFromSource(wordObj, sourceCol, sourceIsStorage, sourceIsCatBox, sourceIndex);
      catBox.words.push(wordObj);
      checkElimination(boxIndex);
    } else {
      // 不同类型：扣心
      G.hearts--;
      removeFromSource(wordObj, sourceCol, sourceIsStorage, sourceIsCatBox, sourceIndex);
      // 尝试放入存储框
      const emptyStoreIndex = findEmptyStorage();
      if (emptyStoreIndex !== -1) {
        G.storage[emptyStoreIndex] = wordObj;
        showToast('类型不匹配！已放入临时存储');
      } else {
        // 放回原位
        returnToSource(wordObj, sourceCol, sourceIsStorage, sourceIsCatBox, sourceIndex);
        showToast('类型不匹配！没有空存储位');
      }
    }
  } else if (target.type === 'storage') {
    const storeIdx = target.index;
    if (G.storage[storeIdx] === null) {
      removeFromSource(wordObj, sourceCol, sourceIsStorage, sourceIsCatBox, sourceIndex);
      G.storage[storeIdx] = wordObj;
    }
  }

  renderGame();
}

function findEmptyStorage() {
  for (let i = 0; i < G.unlockedStorage; i++) {
    if (G.storage[i] === null) return i;
  }
  return -1;
}

// sourceIsCatBox / sourceIsStorage 互斥，都不为true则为队列来源
// sourceIndex: 列索引 / 存储索引 / 分类框索引
function removeFromSource(wordObj, sourceCol, sourceIsStorage, sourceIsCatBox, sourceIndex) {
  if (sourceIsCatBox) {
    const box = G.categoryBoxes[sourceIndex];
    const idx = box.words.indexOf(wordObj);
    if (idx !== -1) box.words.splice(idx, 1);
    if (box.words.length === 0) box.typeId = null;
  } else if (sourceIsStorage) {
    G.storage[sourceIndex] = null;
  } else {
    const col = G.columns[sourceCol];
    const idx = col.indexOf(wordObj);
    if (idx !== -1) col.splice(idx, 1);
  }
}

function returnToSource(wordObj, sourceCol, sourceIsStorage, sourceIsCatBox, sourceIndex) {
  if (sourceIsCatBox) {
    G.categoryBoxes[sourceIndex].words.push(wordObj);
    G.categoryBoxes[sourceIndex].typeId = wordObj.typeId;
  } else if (sourceIsStorage) {
    G.storage[sourceIndex] = wordObj;
  } else {
    G.columns[sourceCol].unshift(wordObj);
  }
}

function cancelDrag() {
  // 不做任何状态改变，只是取消视觉反馈
}

function cleanupDrag() {
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', onDragEnd);

  if (G.dragClone) {
    G.dragClone.remove();
    G.dragClone = null;
  }
  G.isDragging = false;
  G.dragData = null;

  // 重置高亮
  document.querySelectorAll('.cat-box').forEach(b => b.style.transform = '');
  document.querySelectorAll('.store-slot').forEach(s => s.style.transform = '');
}

// ============================================================
// 八、消除与胜负判定
// ============================================================

function checkElimination(boxIndex) {
  const catBox = G.categoryBoxes[boxIndex];
  if (catBox.words.length >= 4) {
    // 找到对应的wrapper元素
    const wrapper = document.querySelectorAll('#category-area .cat-wrapper')[boxIndex];
    const label = wrapper ? wrapper.querySelector('.cat-type-label') : null;

    // 获取分类框内的单词元素
    const boxEl = wrapper ? wrapper.querySelector('.cat-box') : null;
    const wordEls = boxEl ? boxEl.querySelectorAll('.cat-word') : [];

    // 显示类型名称（标签已在renderCategoryBoxes中设置文本和颜色）
    if (label) {
      label.style.opacity = '1';
    }

    // 延迟1000ms后：单词消失 + 类型名消失 + 分类框清空
    setTimeout(() => {
      // 单词消除动画
      wordEls.forEach(el => el.classList.add('eliminating'));
      if (label) {
        label.style.transition = 'opacity 0.3s';
        label.style.opacity = '0';
      }

      // 动画结束后清除数据并重绘
      setTimeout(() => {
        catBox.words = [];
        catBox.typeId = null;
        renderGame();
      }, 400);
    }, 1000);
  }
}

function checkWinLose() {
  // 检查失败条件
  // 1. 红心耗尽
  if (G.hearts <= 0) {
    showDefeat('红心已耗尽！');
    return;
  }

  // 2. 死锁检测
  if (checkDeadlock()) {
    // 但如果已经清空了所有单词，不需要检测死锁
    if (!isAllCleared()) {
      showDefeat('无法继续，进入死局！');
      return;
    }
  }

  // 检查胜利条件
  if (isAllCleared()) {
    showVictory();
  }
}

function isAllCleared() {
  const allColsEmpty = G.columns.every(c => c.length === 0);
  const allCatsEmpty = G.categoryBoxes.every(b => b.words.length === 0);
  return allColsEmpty && allCatsEmpty;
}

function checkDeadlock() {
  // 死锁条件：同时满足：
  // - 没有空白的分类框（考虑所有框，含未解锁）
  // - 没有空位的存储框（考虑所有框，含未解锁）
  // - 所有列顶端单词的类型与所有已占用分类框的类型都不匹配

  // 检查是否有空分类框（包括未解锁的，玩家可以解锁后再用）
  const hasEmptyCat = G.categoryBoxes.some(b => b.words.length === 0);
  if (hasEmptyCat) return false;

  // 检查是否有空存储框（包括未解锁的）
  const hasEmptyStorage = G.storage.some(s => s === null);
  if (hasEmptyStorage) return false;

  // 收集所有已占用分类框的类型（包括未解锁的，因为它们也可能有内容）
  const occupiedTypes = new Set();
  G.categoryBoxes.forEach(b => {
    if (b.typeId !== null) {
      occupiedTypes.add(b.typeId);
    }
  });

  // 检查每个列的顶端单词类型
  for (const col of G.columns) {
    if (col.length === 0) continue;
    const topType = col[0].typeId;
    if (occupiedTypes.has(topType)) return false;
  }

  return true; // 所有顶端单词都不匹配 → 死锁
}

// ============================================================
// 九、弹窗
// ============================================================

function showVictory() {
  const modal = document.getElementById('victory-modal');
  const btn = document.getElementById('victory-btn');
  const desc = document.getElementById('victory-desc');

  const isLastLevel = G.currentLevelIndex >= LEVELS.length - 1;
  if (isLastLevel) {
    btn.textContent = '全部通关';
    btn.onclick = backToSelect;
    desc.textContent = '你已经完成全部关卡！';
  } else {
    btn.textContent = '下一关';
    btn.onclick = nextLevel;
    desc.textContent = `第 ${G.currentLevelIndex + 1} 关完成！`;
  }

  modal.classList.add('show');
}

function showDefeat(reason) {
  const modal = document.getElementById('defeat-modal');
  document.getElementById('defeat-desc').textContent = reason;
  modal.classList.add('show');
}

function hideModals() {
  document.getElementById('victory-modal').classList.remove('show');
  document.getElementById('defeat-modal').classList.remove('show');
  document.getElementById('loading-modal').classList.remove('show');
}

function showLoading() {
  document.getElementById('loading-modal').classList.add('show');
}

function hideLoading() {
  document.getElementById('loading-modal').classList.remove('show');
}

function nextLevel() {
  hideModals();
  if (G.currentLevelIndex < LEVELS.length - 1) {
    startLevel(G.currentLevelIndex + 1);
  } else {
    backToSelect();
  }
}

function resetLevel() {
  hideModals();
  resetGameState();
  renderGame();
}

function backToSelect() {
  hideModals();
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('level-select').style.display = 'flex';
  G.currentLevelIndex = 0;
}

// ============================================================
// 十、Toast提示
// ============================================================

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 1500);
}

// ============================================================
// 十一、初始化
// ============================================================

renderLevelSelect();

console.log('Word Sort 游戏初始化完成！');
console.log(`配置：${Object.keys(WORDS).length}个单词，${Object.keys(TYPES).length}种类型，${LEVELS.length}个关卡`);
</script>
